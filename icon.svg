<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2B579A"/>
      <stop offset="1" stop-color="#1E3A6B"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef1f5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- rounded app tile -->
  <rect x="0" y="0" width="512" height="512" rx="104" fill="url(#bg)"/>

  <!-- document page with folded corner -->
  <g filter="url(#shadow)">
    <path d="M148 92
             h150
             l66 66
             v262
             a20 20 0 0 1 -20 20
             h-196
             a20 20 0 0 1 -20 -20
             v-308
             a20 20 0 0 1 20 -20 z"
          fill="url(#page)"/>
    <!-- folded corner -->
    <path d="M298 92 l66 66 h-46 a20 20 0 0 1 -20 -20 z" fill="#c9d2df"/>
  </g>

  <!-- content lines on the page -->
  <g fill="#c3ccd8">
    <rect x="176" y="188" width="118" height="14" rx="7"/>
    <rect x="176" y="220" width="160" height="14" rx="7"/>
    <rect x="176" y="252" width="140" height="14" rx="7"/>
  </g>

  <!-- red PDF-style tag with lowercase md -->
  <g>
    <rect x="150" y="300" width="212" height="96" rx="20" fill="#E23A2E"/>
    <rect x="150" y="300" width="212" height="96" rx="20" fill="#000000" opacity="0.06"/>
    <text x="256" y="368"
          font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
          font-size="70" font-weight="700" fill="#ffffff"
          text-anchor="middle" letter-spacing="2">md</text>
  </g>
</svg>
