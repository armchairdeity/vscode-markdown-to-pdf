<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="pageClip">
      <path d="M174 118 H344 L392 166 V416 A16 16 0 0 1 376 432 H174 A16 16 0 0 1 158 416 V134 A16 16 0 0 1 174 118 Z"/>
    </clipPath>
  </defs>

  <!-- back page (stacked), tilted -->
  <g transform="rotate(-8 245 300)">
    <rect x="138" y="150" width="228" height="300" rx="16" fill="#B21E12"/>
  </g>

  <!-- front page body -->
  <path d="M174 118 H344 L392 166 V416 A16 16 0 0 1 376 432 H174 A16 16 0 0 1 158 416 V134 A16 16 0 0 1 174 118 Z"
        fill="#E7EAF3"/>

  <!-- red PDF banner (clipped to page) -->
  <g clip-path="url(#pageClip)">
    <rect x="150" y="118" width="252" height="78" fill="#D42B24"/>
    <text x="248" y="177" font-family="Arial, 'Helvetica Neue', sans-serif"
          font-size="58" font-weight="800" fill="#ffffff" text-anchor="middle"
          letter-spacing="1">PDF</text>
  </g>

  <!-- folded corner -->
  <path d="M344 118 L392 166 H344 Z" fill="#9E1A0F"/>

  <!-- content placeholder box with heading lines -->
  <rect x="196" y="226" width="158" height="70" rx="8" fill="#F3CBC6"/>
  <rect x="214" y="246" width="122" height="12" rx="6" fill="#E39A93"/>
  <rect x="214" y="270" width="98" height="12" rx="6" fill="#E39A93"/>

  <!-- convert badge: red chip with folder tab -->
  <path d="M214 300 h44 l14 16 h120 a20 20 0 0 1 20 20 v40 a20 20 0 0 1 -20 20 H214 a20 20 0 0 1 -20 -20 v-76 a20 20 0 0 1 20 -20 Z"
        fill="#E13328"/>

  <!-- "≈md" wordmark -->
  <text x="250" y="384" font-family="'Trebuchet MS', 'Segoe UI', Arial, sans-serif"
        font-size="52" font-weight="700" font-style="italic" fill="#ffffff"
        text-anchor="middle">≈md</text>

  <!-- convert arrow: white circle + red play triangle, protruding right -->
  <circle cx="392" cy="366" r="42" fill="#ffffff"/>
  <path d="M379 344 L379 388 L414 366 Z" fill="#E13328"/>
</svg>
